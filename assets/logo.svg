<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80">
  <defs>
    <linearGradient id="iconbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563a8"/>
      <stop offset="100%" stop-color="#1a1464"/>
    </linearGradient>
    <linearGradient id="progressbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#2563a8"/>
    </linearGradient>
  </defs>
  <!-- Icon square -->
  <rect x="0" y="0" width="72" height="72" rx="18" fill="url(#iconbg)"/>
  <!-- Road lanes -->
  <rect x="10" y="20" width="52" height="32" rx="6" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="1.5"/>
  <line x1="10" y1="36" x2="62" y2="36" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-dasharray="6 4"/>
  <!-- Progress fill -->
  <rect x="10" y="20" width="34" height="32" rx="6" fill="url(#progressbar)" opacity=".85"/>
  <!-- Arrow tip -->
  <polygon points="44,28 54,36 44,44" fill="#fff" opacity=".9"/>
  <!-- Milestone dots -->
  <circle cx="18" cy="36" r="3.5" fill="#fff"/>
  <circle cx="30" cy="36" r="3.5" fill="#fff" opacity=".7"/>
  <!-- Wordmark -->
  <text x="88" y="38" font-family="Georgia,'Times New Roman',serif" font-size="32" font-weight="700" fill="#1a1464" letter-spacing="-0.5">Roadmapper</text>
  <rect x="89" y="46" width="56" height="3" rx="1.5" fill="url(#progressbar)"/>
  <text x="89" y="62" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#7b8db0" letter-spacing="3">BY PM</text>
</svg>
