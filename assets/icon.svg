<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563a8"/>
      <stop offset="100%" stop-color="#1a1464"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Row 1 — full white bar -->
  <rect x="72" y="96" width="368" height="72" rx="36" fill="rgba(255,255,255,.92)"/>
  <!-- Row 2 — green progress bar -->
  <rect x="72" y="200" width="230" height="72" rx="36" fill="#16a34a" opacity=".92"/>
  <!-- Row 3 — left partial -->
  <rect x="72" y="304" width="160" height="72" rx="36" fill="rgba(255,255,255,.5)"/>
  <!-- Row 3 — right partial -->
  <rect x="264" y="304" width="176" height="72" rx="36" fill="rgba(255,255,255,.25)"/>
  <!-- Milestone dot row 1 -->
  <circle cx="440" cy="132" r="28" fill="#4a90d9" stroke="#fff" stroke-width="10"/>
  <!-- Milestone dot row 2 -->
  <circle cx="302" cy="236" r="28" fill="#fff" stroke="#16a34a" stroke-width="10"/>
  <!-- Bottom label -->
  <text x="256" y="452" text-anchor="middle" font-family="Georgia,serif" font-size="68" font-weight="700" fill="rgba(255,255,255,.65)" letter-spacing="6">PMR</text>
</svg>
