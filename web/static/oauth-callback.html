<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roadmap OS — Integration callback</title>
<style>
:root { color-scheme: dark; }
*, *::before, *::after { box-sizing: border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.card { max-width:440px; width:100%; background:#1e293b; border:1px solid #334155; border-radius:14px; padding:36px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.4); }
.icon { width:64px; height:64px; margin:0 auto 20px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
.icon.ok { background:rgba(34,197,94,.12); }
.icon.err { background:rgba(239,68,68,.12); }
.icon svg { width:32px; height:32px; stroke-width:2.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.icon.ok svg { stroke:#22c55e; }
.icon.err svg { stroke:#ef4444; }
h1 { margin:0 0 12px; font-size:22px; font-weight:700; color:#f1f5f9; }
p { margin:0 0 24px; font-size:14px; line-height:1.6; color:#94a3b8; }
.actions { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
button, a.btn { padding:10px 18px; background:#3b82f6; color:#fff; border:0; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; text-decoration:none; display:inline-block; font-family:inherit; }
button.secondary, a.btn.secondary { background:transparent; color:#94a3b8; border:1px solid #334155; }
button:hover { background:#2563eb; }
button.secondary:hover { color:#cbd5e1; border-color:#475569; }
.small { font-size:11px; color:#64748b; margin-top:18px; }
</style>
</head>
<body>
<div class="card" id="card"></div>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var connected = params.get('connected');
  var error = params.get('error');

  var ok = !!connected && !error;
  var providerRaw = connected || 'Integration';
  var provider = providerRaw.charAt(0).toUpperCase() + providerRaw.slice(1);

  var title = ok ? provider + ' connected' : provider + " couldn't be connected";
  var subtitle = ok
    ? 'Your connection is live. Return to Roadmap OS — the integrations page will refresh within a few seconds.'
    : (error || 'Something went wrong during authorization. Please try again from the integrations page.');

  var iconSvg = ok
    ? '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
    : '<svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>';

  // Build the URL that opens the SPA on the integrations page.
  var spaUrl = '/#integrations' + (ok ? '?connected=' + encodeURIComponent(providerRaw) : '?error=' + encodeURIComponent(error || 'unknown'));

  function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  document.getElementById('card').innerHTML =
    '<div class="icon ' + (ok ? 'ok' : 'err') + '">' + iconSvg + '</div>' +
    '<h1>' + escHtml(title) + '</h1>' +
    '<p>' + escHtml(subtitle) + '</p>' +
    '<div class="actions">' +
      '<button onclick="closeTab()">Close this tab</button>' +
      '<a class="btn secondary" href="' + escHtml(spaUrl) + '">Open Roadmap OS</a>' +
    '</div>' +
    '<div class="small">If you started this from the desktop app, switch back to it — no further action needed.</div>';

  document.title = (ok ? title : 'Connection failed') + ' — Roadmap OS';

  window.closeTab = function(){
    try { window.close(); } catch(e){}
    setTimeout(function(){
      document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#94a3b8;font-family:sans-serif">You can close this tab manually now.</div>';
    }, 100);
  };

  // If this was opened as a popup (web flow), auto-close after 1.5s on success.
  if (ok && window.opener && window.opener !== window) {
    setTimeout(window.closeTab, 1500);
  }
})();
</script>
</body>
</html>
